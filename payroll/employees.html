<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>View All Employees - BMGOne Payroll</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <style>
        .employees-container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 2rem;
        }
        
        .employees-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
        }
        
        .search-filter {
            display: flex;
            gap: 1rem;
            margin-bottom: 2rem;
        }
        
        .search-input {
            flex: 1;
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
        }
        
        .filter-select {
            padding: 0.75rem;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 0.9rem;
            min-width: 150px;
        }
        
        .employees-table {
            width: 100%;
            background: white;
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }
        
        .employees-table table {
            width: 100%;
            border-collapse: collapse;
        }
        
        .employees-table th {
            background: var(--gradient-primary);
            color: white;
            padding: 1rem;
            text-align: left;
            font-weight: 600;
        }
        
        .employees-table td {
            padding: 1rem;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .employees-table tr:hover {
            background-color: #f9fafb;
        }
        
        .status-badge {
            padding: 0.25rem 0.75rem;
            border-radius: 20px;
            font-size: 0.85rem;
            font-weight: 600;
        }
        
        .status-active {
            background: #d1fae5;
            color: #065f46;
        }
        
        .status-inactive {
            background: #fee2e2;
            color: #991b1b;
        }
        
        .btn-action {
            padding: 0.5rem 1rem;
            border: none;
            border-radius: 6px;
            font-size: 0.85rem;
            cursor: pointer;
            margin-right: 0.5rem;
        }
        
        .btn-view {
            background: #3b82f6;
            color: white;
        }
        
        .btn-edit {
            background: #f59e0b;
            color: white;
        }
        
        .no-results {
            text-align: center;
            padding: 3rem;
            color: #6b7280;
        }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar" id="navbar">
        <div class="nav-container">
            <div class="nav-logo">
                <img src="logos/banner.png" alt="BMGOne" class="logo-img">
            </div>
            <div class="nav-menu">
                <a href="index.html">Dashboard</a>
                <a href="onboarding.html">Employee Onboarding</a>
                <a href="employees.html" class="active">View All Employees</a>
                <a href="#" id="leaveApprovalsLink">Leave Approvals</a>
                <a href="#" id="reportsLink">Reports</a>
                <a href="#" id="logoutBtn">Logout</a>
            </div>
        </div>
    </nav>

    <div class="employees-container">
        <div class="employees-header">
            <h1>All Employees</h1>
            <button class="btn-submit" onclick="window.location.href='onboarding.html'">
                + Add New Employee
            </button>
        </div>

        <div class="search-filter">
            <input type="text" class="search-input" id="searchInput" placeholder="Search by name, employee ID, or email...">
            <select class="filter-select" id="departmentFilter">
                <option value="">All Departments</option>
                <option value="IT Consulting">IT Consulting</option>
                <option value="Business Consulting">Business Consulting</option>
                <option value="HR">HR</option>
                <option value="Finance">Finance</option>
                <option value="Marketing">Marketing</option>
                <option value="Operations">Operations</option>
            </select>
            <select class="filter-select" id="statusFilter">
                <option value="">All Status</option>
                <option value="1">Active</option>
                <option value="0">Inactive</option>
            </select>
        </div>

        <div class="employees-table">
            <table>
                <thead>
                    <tr>
                        <th>Employee ID</th>
                        <th>Name</th>
                        <th>Email</th>
                        <th>Department</th>
                        <th>Position</th>
                        <th>Role</th>
                        <th>Status</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="employeesTableBody">
                    <!-- Will be populated dynamically -->
                </tbody>
            </table>
        </div>
    </div>

    <script src="../script.js"></script>
    <script>
        const CONFIG = {
            API_BASE: window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1' 
                ? 'http://127.0.0.1:8788/api' 
                : 'https://pay.bmgone.com/api'
        };

        const token = localStorage.getItem('token');
        const employee = JSON.parse(localStorage.getItem('employee') || '{}');

        if (!token || (employee.role !== 'admin' && employee.role !== 'master_admin')) {
            alert('Access denied. Admin privileges required.');
            window.location.href = 'index.html';
        }

        let allEmployees = [];

        // Load employees
        loadEmployees();

        // Search and filter event listeners
        document.getElementById('searchInput').addEventListener('input', filterEmployees);
        document.getElementById('departmentFilter').addEventListener('change', filterEmployees);
        document.getElementById('statusFilter').addEventListener('change', filterEmployees);

        async function loadEmployees() {
            try {
                const response = await fetch(`${CONFIG.API_BASE}/employees`, {
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });

                const data = await response.json();

                if (response.ok) {
                    allEmployees = data.employees || [];
                    displayEmployees(allEmployees);
                } else {
                    alert('Failed to load employees: ' + data.error);
                }
            } catch (error) {
                console.error('Error loading employees:', error);
                alert('Failed to load employees. Please try again.');
            }
        }

        function displayEmployees(employees) {
            const tbody = document.getElementById('employeesTableBody');
            
            if (employees.length === 0) {
                tbody.innerHTML = '<tr><td colspan="8" class="no-results">No employees found</td></tr>';
                return;
            }

            tbody.innerHTML = employees.map(emp => `
                <tr>
                    <td>${emp.employee_id}</td>
                    <td>${emp.first_name} ${emp.last_name}</td>
                    <td>${emp.email}</td>
                    <td>${emp.department || '-'}</td>
                    <td>${emp.position || '-'}</td>
                    <td>${emp.role || '-'}</td>
                    <td>
                        <span class="status-badge ${emp.is_active ? 'status-active' : 'status-inactive'}">
                            ${emp.is_active ? 'Active' : 'Inactive'}
                        </span>
                    </td>
                    <td>
                        <button class="btn-action btn-view" onclick="viewEmployee('${emp.employee_id}')">View</button>
                        <button class="btn-action btn-edit" onclick="editEmployee('${emp.employee_id}')">Edit</button>
                    </td>
                </tr>
            `).join('');
        }

        function filterEmployees() {
            const searchTerm = document.getElementById('searchInput').value.toLowerCase();
            const departmentFilter = document.getElementById('departmentFilter').value;
            const statusFilter = document.getElementById('statusFilter').value;

            const filtered = allEmployees.filter(emp => {
                const matchesSearch = !searchTerm || 
                    emp.employee_id.toLowerCase().includes(searchTerm) ||
                    `${emp.first_name} ${emp.last_name}`.toLowerCase().includes(searchTerm) ||
                    emp.email.toLowerCase().includes(searchTerm);

                const matchesDepartment = !departmentFilter || emp.department === departmentFilter;
                const matchesStatus = !statusFilter || emp.is_active.toString() === statusFilter;

                return matchesSearch && matchesDepartment && matchesStatus;
            });

            displayEmployees(filtered);
        }

        function viewEmployee(employeeId) {
            // TODO: Implement view employee details
            alert(`View employee ${employeeId} - Feature coming soon`);
        }

        function editEmployee(employeeId) {
            // TODO: Implement edit employee
            alert(`Edit employee ${employeeId} - Feature coming soon`);
        }

        // Logout
        document.getElementById('logoutBtn').addEventListener('click', async function(e) {
            e.preventDefault();
            try {
                await fetch(`${CONFIG.API_BASE}/auth/logout`, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${token}`
                    }
                });
            } catch (error) {
                console.error('Logout error:', error);
            }
            
            localStorage.removeItem('token');
            localStorage.removeItem('employee');
            window.location.href = 'index.html';
        });
    </script>
</body>
</html>
