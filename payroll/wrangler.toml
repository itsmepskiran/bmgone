name = "bmgone-payroll-api"
main = "workers/src/index.js"
compatibility_date = "2024-09-23"
compatibility_flags = ["nodejs_compat"]

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# D1 Database Binding
[[env.production.d1_databases]]
binding = "DB"
database_name = "bmgpayroll"
database_id = "ceceeaf8-8c03-4299-9df9-9f0330b88493"

[[env.development.d1_databases]]
binding = "DB"
database_name = "bmgpayroll"
database_id = "ceceeaf8-8c03-4299-9df9-9f0330b88493"

# R2 Bucket for file uploads (optional)
[[env.production.r2_buckets]]
binding = "FILES"
bucket_name = "bmgpayroll"

[[env.development.r2_buckets]]
binding = "FILES"
bucket_name = "bmgpayroll"

# Environment variables
[vars]
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
CORS_ORIGIN = "https://bmgone.com"
API_VERSION = "v1"
