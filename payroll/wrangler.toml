name = "bmgone-payroll-api"
main = "workers/src/index.js"
compatibility_date = "2024-03-20"

[env.production]
vars = { ENVIRONMENT = "production" }

[env.development]
vars = { ENVIRONMENT = "development" }

# D1 Database Binding
[[env.production.d1_databases]]
binding = "DB"
database_name = "bmgone-payroll-db"
database_id = "your-database-id-here"

[[env.development.d1_databases]]
binding = "DB"
database_name = "bmgone-payroll-db-dev"
database_id = "your-dev-database-id-here"

# R2 Bucket for file uploads (optional)
[[env.production.r2_buckets]]
binding = "FILES"
bucket_name = "bmgone-payroll-files"

[[env.development.r2_buckets]]
binding = "FILES"
bucket_name = "bmgone-payroll-files-dev"

# Environment variables
[vars]
JWT_SECRET = "your-super-secret-jwt-key-change-in-production"
CORS_ORIGIN = "https://bmgone.com"
API_VERSION = "v1"
